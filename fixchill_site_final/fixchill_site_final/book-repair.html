<main class="book-main">
  <section id="book-repair" class="section container booking-section booking-page-section">
    <p class="service-note">We Come To You</p>
    <h1>Book Repair</h1>
    <p class="booking-intro">Tell us your device, the repair issue, and the day and time that works best for you. We will contact you to confirm your mobile repair appointment.</p>
    <form class="form booking-form" action="https://formsubmit.co/fixandchill1@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="Fix and Chill repair booking request">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      <label>Make
        <input name="make" placeholder="e.g., Apple, Samsung, Google" required>
      </label>
      <label>Model
        <input name="model" placeholder="e.g., iPhone 14 Pro, Galaxy S23, iPad Air" required>
      </label>
      <label>Problem / Repair Needed
        <select name="problem" required>
          <option value="">Select problem</option>
          <option>Cracked screen</option>
          <option>Battery replacement</option>
          <option>Charging port issue</option>
          <option>Tablet screen replacement</option>
          <option>Water damage</option>
          <option>Not turning on</option>
          <option>Other repair</option>
        </select>
      </label>
      <label>What day are you available?
        <input type="date" name="preferred_day" required>
      </label>
      <label>What time are you available?
        <input type="time" name="preferred_time" required>
      </label>
      <label>Your Name
        <input name="name" required>
      </label>
      <label>Phone Number
        <input name="phone" required>
      </label>
      <label>Email
        <input type="email" name="email" placeholder="customer@email.com" required>
      </label>
      <label>Service Location / Notes
        <textarea name="location_notes" rows="4" placeholder="City, address or general area. Add anything we should know."></textarea>
      </label>
      <button class="btn btn-accent" type="submit">Submit Repair Booking</button>
    </form>
  </section>
</main>
